<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora B2B</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans p-6">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="bg-blue-800 text-white p-6 rounded-2xl shadow-md flex justify-between items-center">
            <h1 class="text-2xl font-bold">Pulpit Zarządzania Centrum B2B</h1>
            <span class="bg-blue-600 px-3 py-1 rounded-full text-sm">Wersja testowa (PoC)</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section class="bg-white p-6 rounded-2xl shadow-md">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Oczekujące wnioski o dostęp</h2>
                <div id="pending-users-list" class="space-y-4">
                    <p class="text-sm text-gray-500 italic">Ładowanie wniosków...</p>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-md">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Opublikuj nowy komunikat</h2>
                <form id="form-new-message" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Kategoria zakładek</label>
                        <select id="msg-category" class="w-full border rounded-xl p-2 bg-gray-50">
                            <option value="komunikaty">Komunikaty (Ogólne)</option>
                            <option value="promocje">Promocje / B2B</option>
                            <option value="iteam">iTeam (IT)</option>
                            <option value="szkolenia">Szkolenia</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Tytuł wiadomości</label>
                        <input type="text" id="msg-title" required class="w-full border rounded-xl p-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Krótki podgląd (zajawka)</label>
                        <input type="text" id="msg-preview" required class="w-full border rounded-xl p-2 bg-gray-50" placeholder="np. Zmiana warunków od poniedziałku...">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Pełna treść komunikatu</label>
                        <textarea id="msg-body" rows="4" required class="w-full border rounded-xl p-2 bg-gray-50"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-green-700">
                        Zapisz w bazie i opublikuj w aplikacji
                    </button>
                    <p id="msg-status" class="text-sm text-center text-green-600 font-bold hidden">Komunikat opublikowany!</p>
                </form>
            </section>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ TUTAJ WKLEJ SWOJĄ KONFIGURACJĘ
        const firebaseConfig = {
            apiKey: "AIzaSyCJiTF066XNnH-yLGVNn6XcYD4X37I9UDM",
  authDomain: "aplikacja-608f2.firebaseapp.com",
  projectId: "aplikacja-608f2",
  storageBucket: "aplikacja-608f2.firebasestorage.app",
  messagingSenderId: "1004154231748",
  appId: "1:1004154231748:web:a5a279ad1187367d9ba291",
  measurementId: "G-DTRX50TEDL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. OBSŁUGA WNIOSKÓW (Real-time listener) ---
        const pendingList = document.getElementById('pending-users-list');
        
        // Pobieraj na żywo z bazy użtykowników ze statusem 'pending'
        const q = query(collection(db, "users"), where("status", "==", "pending"));
        onSnapshot(q, (snapshot) => {
            pendingList.innerHTML = ''; // Czyścimy listę
            if(snapshot.empty) {
                pendingList.innerHTML = '<p class="text-sm text-gray-500 italic">Brak nowych wniosków.</p>';
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const card = document.createElement('div');
                card.className = "border border-gray-200 p-4 rounded-xl flex flex-col space-y-2 bg-gray-50";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <strong class="text-gray-800">${data.companyName}</strong>
                        <span class="text-xs text-gray-500">NIP: ${data.nip}</span>
                    </div>
                    <p class="text-sm text-gray-600">Email: ${data.email} | Tel: ${data.phone}</p>
                    <div class="flex space-x-2 mt-2">
                        <button onclick="approveUser('${userDoc.id}', '${data.email}')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-blue-700">Akceptuj i Generuj PIN</button>
                        <button onclick="rejectUser('${userDoc.id}')" class="flex-1 bg-red-100 text-red-600 py-2 rounded-lg text-sm font-bold hover:bg-red-200">Odrzuć</button>
                    </div>
                `;
                pendingList.appendChild(card);
            });
        });

        // Globalne funkcje do przycisków
        window.approveUser = async function(docId, email) {
            // Generujemy losowy 6-cyfrowy PIN
            const pin = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Aktualizujemy dokument w bazie
            await updateDoc(doc(db, "users", docId), {
                status: 'approved',
                pin: pin
            });

            // Automatycznie otwieramy szkic e-maila z gotowym PIN-em!
            const subject = encodeURIComponent("Dostęp do Centrum B2B - Twój Kod PIN");
            const body = encodeURIComponent(`Witaj,\n\nTwój wniosek został zaakceptowany.\nTwój jednorazowy kod PIN do aplikacji to: ${pin}\n\nWpisz go w aplikacji, aby kontynuować.`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        };

        window.rejectUser = async function(docId) {
            if(confirm("Na pewno usunąć ten wniosek?")) {
                await deleteDoc(doc(db, "users", docId));
            }
        };

        // --- 2. DODAWANIE NOWYCH KOMUNIKATÓW DO BAZY ---
        document.getElementById('form-new-message').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = document.getElementById('msg-status');
            btn.disabled = true;

            // Tworzymy dzisiejszą datę w formacie tekstowym
            const today = new Date().toLocaleDateString('pl-PL', { day: 'numeric', month: 'short', year: 'numeric' });

            const newMsg = {
                category: document.getElementById('msg-category').value,
                title: document.getElementById('msg-title').value,
                preview: document.getElementById('msg-preview').value,
                body: document.getElementById('msg-body').value,
                date: today,
                image: "", // Zostawiamy puste na ten moment
                attachments: [],
                createdAt: new Date() // Do sortowania po dacie
            };

            try {
                // Zapisujemy nowy komunikat w zupełnie nowej kolekcji "messages"
                await addDoc(collection(db, "messages"), newMsg);
                
                status.classList.remove('hidden');
                e.target.reset(); // Czyszczenie formularza
                
                setTimeout(() => { status.classList.add('hidden'); btn.disabled = false; }, 3000);
            } catch (error) {
                console.error("Błąd dodawania wiadomości:", error);
                alert("Wystąpił błąd podczas publikacji.");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
