<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instalbud B2B</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        .active-tab { color: #dc2626 !important; transform: scale(1.08); }
        .unread-glow { border-left: 6px solid #dc2626 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-32">

    <!-- EKRAN LOGOWANIA -->
    <div id="screen-login" class="flex flex-col items-center justify-center min-h-screen p-6 bg-blue-900">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border-b-8 border-red-600">
            <div class="flex justify-center mb-6 bg-blue-950 p-5 rounded-2xl shadow-inner border border-blue-800">
                <img src="ib.png" alt="Instalbud Logo" class="h-12 object-contain">
            </div>
            <form id="form-login" class="space-y-4">
                <input type="email" id="login-email" placeholder="E-mail" required class="w-full px-5 py-4 bg-slate-50 border-2 rounded-xl focus:border-red-600 outline-none">
                <input type="password" id="login-password" placeholder="Hasło" required class="w-full px-5 py-4 bg-slate-50 border-2 rounded-xl focus:border-red-600 outline-none">
                <button type="submit" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl uppercase">Zaloguj się</button>
                <p id="login-status" class="text-sm text-center text-red-600 font-bold"></p>
            </form>
        </div>
    </div>

    <!-- GŁÓWNA APLIKACJA -->
    <div id="screen-app" class="hidden">
        <header class="bg-blue-900 text-white p-5 sticky top-0 z-50 flex justify-between items-center border-b-4 border-red-600">
            <img src="ib.png" alt="Instalbud Logo" class="h-8 object-contain">
            <button onclick="logout()" class="p-2.5 bg-blue-800 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
        </header>

        <main class="p-4 max-w-2xl mx-auto space-y-4">
            <div id="module-komunikaty" class="app-module space-y-4"></div>
            <!-- Pozostałe moduły... -->
        </main>
    </div>

    <!-- ZAPYTANIE OFERTOWE -->
    <div id="screen-contact" class="hidden min-h-screen bg-slate-50">
        <header class="bg-blue-900 text-white p-5 flex items-center space-x-4 border-b-4 border-red-600">
            <button onclick="showScreen('screen-app')" class="p-2 bg-blue-800 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-black uppercase">Zapytanie Ofertowe</h1>
        </header>
        <main class="p-4 max-w-2xl mx-auto">
            <div class="bg-white p-6 rounded-2xl shadow-md text-center border-t-4 border-red-600 mb-4">
                <img id="manager-img" src="https://ui-avatars.com/api/?name=Biuro+Obslugi&background=1e3a8a&color=fff" class="w-24 h-24 rounded-2xl mx-auto mb-3 object-cover">
                <h2 id="manager-name" class="text-xl font-black text-blue-900">Biuro Obsługi</h2>
                <div class="flex justify-center space-x-3 mt-4">
                    <a id="manager-phone-link" href="#" class="bg-green-500 text-white py-3 px-4 rounded-xl font-bold text-sm">Zadzwoń</a>
                    <a id="manager-email-link" href="#" class="bg-blue-600 text-white py-3 px-4 rounded-xl font-bold text-sm">E-mail</a>
                </div>
            </div>
            <!-- Formularz... -->
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCJiTF066XNnH-yLGVNn6XcYD4X37I9UDM",
            projectId: "aplikacja-608f2",
            storageBucket: "aplikacja-608f2.firebasestorage.app"
        });
        const db = getFirestore(app);

        // Pobieranie danych opiekuna na podstawie managerId zapisanego w dokumencie użytkownika
        function loadManagerData(managerId) {
            if (!managerId) return;
            onSnapshot(doc(db, "managers", managerId), (mSnap) => {
                if(mSnap.exists()) {
                    const mData = mSnap.data();
                    document.getElementById('manager-name').innerText = mData.name;
                    document.getElementById('manager-img').src = mData.imageUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(mData.name)}`;
                    document.getElementById('manager-phone-link').href = "tel:" + mData.phone;
                    document.getElementById('manager-email-link').href = "mailto:" + mData.email;
                }
            });
        }

        // Przy logowaniu zaciągamy managerId użytkownika
        // ... (reszta logiki logowania)
    </script>
</body>
</html>
