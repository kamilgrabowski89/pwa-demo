<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora - Instalbud B2B</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans p-6 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-8 pb-12">
        <!-- NAGŁÓWEK -->
        <header class="bg-blue-900 text-white p-6 rounded-[2rem] shadow-xl flex justify-between items-center border-b-4 border-red-600">
            <div class="flex items-center space-x-4">
                <!-- POPRAWIONE TŁO DLA BIAŁEGO LOGO W ADMINIE -->
                <div class="bg-blue-950 p-3 rounded-2xl shadow-inner border border-blue-800">
                    <img src="ib.png" alt="Instalbud Logo" class="h-10 object-contain">
                </div>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tighter">B2B Admin</h1>
                    <p class="text-xs font-bold text-blue-200 tracking-widest uppercase mt-1">Zarządzanie treścią, opiekunami i wnioskami</p>
                </div>
            </div>
        </header>

        <section class="bg-white p-8 rounded-[2.5rem] shadow-lg border-2 border-slate-100">
            <div class="flex items-center space-x-3 mb-6">
                <i class="fa-solid fa-user-tie text-2xl text-red-600"></i>
                <h2 class="text-xl font-black text-blue-900 uppercase tracking-tight">Dodaj Nowego Opiekuna Handlowego</h2>
            </div>
            <form id="form-new-manager" class="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Imię i Nazwisko</label>
                    <input type="text" id="manager-name-input" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 text-sm font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">E-mail</label>
                    <input type="email" id="manager-email-input" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 text-sm font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Telefon komórkowy</label>
                    <input type="tel" id="manager-phone-input" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 text-sm font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Zdjęcie / Awatar opiekuna</label>
                    <input type="file" id="manager-image-input" accept="image/*" class="w-full text-xs text-slate-500">
                </div>
                <div class="md:col-span-4">
                    <button type="submit" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl shadow-md uppercase text-xs tracking-wider cursor-pointer">
                        Zapisz opiekuna w systemie
                    </button>
                    <p id="manager-status" class="hidden text-xs text-center font-bold mt-2 text-green-600 bg-green-50 p-2 rounded-lg"></p>
                </div>
            </form>
        </section>

        <section class="bg-white p-8 rounded-[2.5rem] shadow-lg border-2 border-slate-100">
            <div class="flex items-center space-x-3 mb-6">
                <i class="fa-solid fa-sliders text-2xl text-red-600"></i>
                <h2 class="text-xl font-black text-blue-900 uppercase tracking-tight">Konfiguracja Zakładek (Nazwy w aplikacji)</h2>
            </div>
            <form id="form-settings" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Zakładka 1 (Info)</label>
                    <input type="text" id="tab1-name" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 font-bold text-blue-900">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Zakładka 2 (Okazje)</label>
                    <input type="text" id="tab2-name" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 font-bold text-blue-900">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Zakładka 3 (iTeam)</label>
                    <input type="text" id="tab3-name" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 font-bold text-blue-900">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Zakładka 4 (Szkolenia)</label>
                    <input type="text" id="tab4-name" required class="w-full border-2 border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:border-red-600 font-bold text-blue-900">
                </div>
                <div class="md:col-span-4 mt-2">
                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg cursor-pointer uppercase tracking-widest text-xs">Zapisz nazwy zakładek</button>
                    <p id="settings-status" class="text-sm text-center text-green-600 font-bold hidden mt-2">Zaktualizowano!</p>
                </div>
            </form>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="bg-white p-8 rounded-[2.5rem] shadow-lg border-2 border-slate-100">
                <div class="flex items-center space-x-3 mb-6">
                    <i class="fa-solid fa-paper-plane text-2xl text-red-600"></i>
                    <h2 class="text-xl font-black text-blue-900 uppercase tracking-tight">Opublikuj Komunikat / Promocję</h2>
                </div>
                <form id="form-new-message" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Wybierz zakładkę w aplikacji</label>
                        <select id="msg-category" class="w-full border-2 border-slate-200 rounded-xl p-4 bg-slate-50 outline-none focus:border-red-600 font-bold text-blue-900">
                            <option value="komunikaty">Zakładka 1 (Info)</option>
                            <option value="promocje">Zakładka 2 (Okazje)</option>
                            <option value="iteam">Zakładka 3 (iTeam)</option>
                            <option value="szkolenia">Zakładka 4 (Szkolenia)</option>
                        </select>
                    </div>
                    <div class="border-2 border-slate-100 p-4 rounded-xl bg-slate-50">
                        <label class="block text-xs font-bold mb-2 text-slate-500 uppercase">Dodaj grafikę (opcjonalnie)</label>
                        <input type="file" id="msg-image" accept="image/*" class="w-full text-xs text-slate-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Tytuł</label>
                        <input type="text" id="msg-title" required class="w-full border-2 border-slate-200 rounded-xl p-4 bg-slate-50 outline-none focus:border-red-600 font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Krótki podgląd</label>
                        <input type="text" id="msg-preview" required class="w-full border-2 border-slate-200 rounded-xl p-4 bg-slate-50 outline-none focus:border-red-600 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-500 uppercase">Pełna treść</label>
                        <textarea id="msg-body" rows="4" required class="w-full border-2 border-slate-200 rounded-xl p-4 bg-slate-50 outline-none focus:border-red-600 text-sm"></textarea>
                    </div>
                    <button type="submit" id="btn-message-send" class="w-full bg-red-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs cursor-pointer">Opublikuj Komunikat</button>
                    <p id="msg-status" class="hidden text-sm text-center font-bold mt-2"></p>
                </form>
            </section>

            <section class="bg-white p-8 rounded-[2.5rem] shadow-lg border-2 border-slate-100 flex flex-col">
                <div class="flex items-center space-x-3 mb-6">
                    <i class="fa-solid fa-users text-2xl text-blue-900"></i>
                    <h2 class="text-xl font-black text-blue-900 uppercase tracking-tight">Wnioski oczekujące na autoryzację</h2>
                </div>
                <div id="pending-users-list" class="space-y-4 overflow-y-auto flex-1 pr-2">
                    <p class="text-sm text-slate-500 italic">Ładowanie wniosków...</p>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc, addDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJiTF066XNnH-yLGVNn6XcYD4X37I9UDM",
            projectId: "aplikacja-608f2",
            storageBucket: "aplikacja-608f2.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const settingsRef = doc(db, "settings", "ui_config");
        let managersGlobalList = [];
        let pendingUsersGlobalList = [];

        onSnapshot(collection(db, "managers"), (snapshot) => {
            managersGlobalList = [];
            snapshot.forEach(d => managersGlobalList.push({ id: d.id, ...d.data() }));
            renderPendingUsersSection(); 
        });

        document.getElementById('form-new-manager').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); const status = document.getElementById('manager-status');
            const file = document.getElementById('manager-image-input').files[0];
            btn.disabled = true; status.innerText = "Trwa zapisywanie..."; status.classList.remove('hidden');

            let imageUrl = "";
            try {
                if(file) {
                    const storageRef = ref(storage, `managers/${Date.now()}_${file.name}`);
                    const snap = await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(snap.ref);
                }
                await addDoc(collection(db, "managers"), {
                    name: document.getElementById('manager-name-input').value.trim(),
                    email: document.getElementById('manager-email-input').value.trim(),
                    phone: document.getElementById('manager-phone-input').value.trim(),
                    imageUrl: imageUrl,
                    createdAt: new Date()
                });
                status.innerText = "Sukces! Dodano opiekuna.";
                e.target.reset(); setTimeout(() => { status.classList.add('hidden'); btn.disabled = false; }, 3000);
            } catch (err) { alert("Błąd dodawania opiekuna."); btn.disabled = false; }
        });

        function renderPendingUsersSection() {
            const pendingListContainer = document.getElementById('pending-users-list');
            pendingListContainer.innerHTML = '';
            
            if(pendingUsersGlobalList.length === 0) {
                pendingListContainer.innerHTML = `<div class="bg-slate-50 border-2 border-dashed p-6 rounded-2xl text-center text-sm font-bold text-slate-400">Brak nowych wniosków</div>`; return;
            }

            pendingUsersGlobalList.forEach((user) => {
                const card = document.createElement('div');
                card.className = "border-2 border-slate-100 p-5 rounded-2xl space-y-3 bg-slate-50 shadow-sm text-slate-900";
                
                let managerOptions = `<option value="">-- Przypisz do Biura Obsługi (Domyślny) --</option>`;
                managersGlobalList.forEach((m) => { managerOptions += `<option value="${m.id}">${m.name} (${m.email})</option>`; });

                card.innerHTML = `
                    <div class="flex justify-between items-start"><strong class="text-blue-900 font-black text-base">${user.companyName}</strong><span class="text-xs font-bold text-slate-500 bg-white px-2 py-0.5 rounded border">NIP: ${user.nip}</span></div>
                    <p class="text-xs font-semibold text-slate-600">${user.email} | Tel: ${user.phone}</p>
                    <div class="pt-1">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Przypisz Opiekuna Handlowego:</label>
                        <select id="select-manager-${user.id}" class="w-full border-2 border-slate-200 rounded-xl p-2.5 bg-white font-bold text-xs text-blue-950 outline-none focus:border-red-600">
                            ${managerOptions}
                        </select>
                    </div>
                    <div class="flex space-x-3 pt-2 border-t border-slate-200">
                        <button onclick="approveUserWithManager('${user.id}', '${user.email}')" class="flex-1 bg-green-600 text-white py-2 rounded-lg text-xs font-black uppercase shadow-sm cursor-pointer"><i class="fa-solid fa-check mr-1"></i>Akceptuj</button>
                        <button onclick="rejectUser('${user.id}')" class="flex-1 bg-white border border-red-200 text-red-600 py-2 rounded-lg text-xs font-black uppercase cursor-pointer"><i class="fa-solid fa-xmark mr-1"></i>Odrzuć</button>
                    </div>`;
                pendingListContainer.appendChild(card);
            });
        }

        onSnapshot(query(collection(db, "users"), where("status", "==", "pending")), (snapshot) => {
            pendingUsersGlobalList = []; snapshot.forEach((docSnap) => { pendingUsersGlobalList.push({ id: docSnap.id, ...docSnap.data() }); });
            renderPendingUsersSection();
        });

        window.approveUserWithManager = async function(docId, email) {
            const selectedManagerId = document.getElementById(`select-manager-${docId}`).value;
            const pin = Math.floor(100000 + Math.random() * 900000).toString();
            await updateDoc(doc(db, "users", docId), { status: 'approved', pin: pin, managerId: selectedManagerId });
            const subject = encodeURIComponent("Dostęp do platformy Instalbud B2B - Twój Kod PIN");
            const body = encodeURIComponent(`Dzień dobry,\n\nTwój wniosek o dostęp do platformy B2B został pomyślnie zweryfikowany.\n\nTwój indywidualny kod PIN do aktywacji konta to: ${pin}\n\nPozdrawiamy,\nZespół Instalbud`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        };

        window.rejectUser = async function(docId) { if(confirm("Usunąć wniosek?")) { await deleteDoc(doc(db, "users", docId)); } };

        getDoc(settingsRef).then((docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.tab1) document.getElementById('tab1-name').value = data.tab1;
                if(data.tab2) document.getElementById('tab2-name').value = data.tab2;
                if(data.tab3) document.getElementById('tab3-name').value = data.tab3;
                if(data.tab4) document.getElementById('tab4-name').value = data.tab4;
            }
        });

        document.getElementById('form-settings').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.disabled = true;
            try {
                await setDoc(settingsRef, {
                    tab1: document.getElementById('tab1-name').value, tab2: document.getElementById('tab2-name').value, tab3: document.getElementById('tab3-name').value, tab4: document.getElementById('tab4-name').value
                }, { merge: true });
                document.getElementById('settings-status').classList.remove('hidden');
                setTimeout(() => { document.getElementById('settings-status').classList.add('hidden'); btn.disabled = false; }, 3000);
            } catch (e) { btn.disabled = false; }
        });

        document.getElementById('form-new-message').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-message-send'); const status = document.getElementById('msg-status');
            const file = document.getElementById('msg-image').files[0];
            btn.disabled = true; status.innerText = "Publikowanie..."; status.className = "text-xs text-center font-bold mt-2 text-blue-900 animate-pulse"; status.classList.remove('hidden');
            let imageUrl = "";

            try {
                if (file) {
                    const storageRef = ref(storage, `messages/${Date.now()}_${file.name}`);
                    const uploadSnap = await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(uploadSnap.ref);
                }
                const today = new Date().toLocaleDateString('pl-PL', { day: 'numeric', month: 'short', year: 'numeric' });
                await addDoc(collection(db, "messages"), {
                    category: document.getElementById('msg-category').value, title: document.getElementById('msg-title').value, imageUrl: imageUrl, 
                    preview: document.getElementById('msg-preview').value, body: document.getElementById('msg-body').value, date: today, createdAt: new Date() 
                });
                status.className = "text-xs text-center font-bold mt-2 text-green-600 bg-green-50 p-2 rounded-lg"; status.innerText = "Opublikowano!";
                e.target.reset(); setTimeout(() => { status.classList.add('hidden'); btn.disabled = false; }, 3000);
            } catch (error) { status.innerText = "Błąd."; btn.disabled = false; }
        });
    </script>
</body>
</html>
